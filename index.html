<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kepler Labs | Accueil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-gradient-kepler { background: linear-gradient(135deg, #0047FF 0%, #f31260 100%); }
    </style>
</head>
<body class="bg-[#F8F9FB] font-sans text-slate-900">

    <nav class="p-5 bg-white shadow-sm flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-4">
            <a href="/" class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white font-black shadow-lg">K</a>
            <h1 class="text-2xl font-black tracking-tighter">KEPLER <span class="text-slate-400 font-light italic">LABS</span></h1>
        </div>

        <div class="relative group">
            <button class="bg-slate-100 hover:bg-slate-200 text-slate-900 px-5 py-2.5 rounded-xl font-bold text-sm transition-all flex items-center space-x-2">
                <span>EXPLORER</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            
            <div class="absolute right-0 mt-2 w-56 bg-white border border-slate-100 rounded-2xl shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50 overflow-hidden">
                <div class="p-2">
                    <a href="/" class="block px-4 py-3 text-sm font-bold text-slate-700 hover:bg-slate-50 rounded-xl flex items-center space-x-3">
                        <span class="w-2 h-2 bg-slate-400 rounded-full"></span>
                        <span>Accueil</span>
                    </a>
                    <hr class="my-1 border-slate-50">
                    <a href="/echostar" class="block px-4 py-3 text-sm font-bold text-slate-700 hover:bg-red-50 hover:text-red-500 rounded-xl flex items-center space-x-3">
                        <span class="w-2 h-2 bg-red-500 rounded-full"></span>
                        <span>Echostar (SATS)</span>
                    </a>
                    <a href="/nebius" class="block px-4 py-3 text-sm font-bold text-slate-700 hover:bg-blue-50 hover:text-blue-600 rounded-xl flex items-center space-x-3">
                        <span class="w-2 h-2 bg-blue-600 rounded-full"></span>
                        <span>Nebius Group</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 py-32 text-center">
        <h2 class="text-7xl font-black text-slate-900 mb-8 tracking-tight">
            Data Hub <br><span class="text-transparent bg-clip-text bg-gradient-kepler">Kepler 2.0</span>
        </h2>
        <p class="text-slate-500 text-xl max-w-2xl mx-auto mb-12 font-medium">
            Interface centralisée pour le monitoring de vos actifs stratégiques. Sélectionnez un projet pour commencer l'analyse.
        </p>
        <div class="flex justify-center space-x-6">
            <a href="/echostar" class="bg-slate-900 text-white px-10 py-5 rounded-2xl font-bold hover:scale-105 transition-transform shadow-2xl">
                Dashbord Echostar
            </a>
            <a href="/nebius" class="bg-white border border-slate-200 text-slate-900 px-10 py-5 rounded-2xl font-bold hover:bg-slate-50 transition-colors">
                Portfolio Nebius
            </a>
        </div>
    </header>

    <style>
        .group:hover .group-hover\:visible { visibility: visible; }
        .group:hover .group-hover\:opacity-100 { opacity: 1; }
    </style>
</body>
</html>
